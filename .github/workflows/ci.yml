name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: frontend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest

  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: backend
            path: backend
            args: .
          - component: frontend
            path: frontend
            args: src tests
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff check (${{ matrix.component }})
        run: ruff check ${{ matrix.args }}

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d --wait

      - name: Smoke test endpoints
        run: |
          curl -fsS http://localhost:8000/health
          curl -fsS -o /dev/null -w "frontend HTTP %{http_code}\n" http://localhost:8501
          curl -fsS -o /dev/null -w "prometheus HTTP %{http_code}\n" http://localhost:9090/-/ready
          curl -fsS -o /dev/null -w "grafana HTTP %{http_code}\n" http://localhost:3000/login

      - name: Tear down
        if: always()
        run: docker compose down -v
