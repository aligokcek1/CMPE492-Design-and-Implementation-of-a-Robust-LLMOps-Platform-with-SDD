[pytest]
asyncio_mode = auto
testpaths = tests/contract tests/integration tests/unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*
; tests/dryrun is intentionally excluded — opt-in only via explicit `pytest tests/dryrun/`
; because it requires LLMOPS_K8S_DRYRUN_KUBECONFIG pointing at a real scratch cluster.
